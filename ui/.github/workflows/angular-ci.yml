name: Angular CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - run: npm ci

      # - run: npm run lint

      # - run: npm run test -- --watch=false --browsers=ChromeHeadless

      - run: npm run build -- --configuration production
