<div class="d-flex  justify-content-center pt-3">
    <div class="input-group w-50">
        <input type="text" class="form-control" (input)="onInput($event)" placeholder="Search products...">

        <span class="input-group-text cursor-pointer">
            🔍
        </span>
    </div>
</div>

<div class="d-flex justify-content-center flex-wrap gap-2 py-3">

    @for(category of categories(); track category) {
    <button class="btn rounded-pill px-4" [class.btn-primary]="selectedCategory() === category"
        [class.btn-outline-secondary]="selectedCategory() !== category" (click)="toggleCategory(category)">
        {{ category }}
    </button>
    }

</div>

<div class="d-flex justify-content-center">
    <div class="container products-grid row">
        @for(product of filteredProducts(); track product.id) {
        <div class="col-md-3 mt-3">
            <app-product-card [product]="product" (favouriteClicked)="toggleFavourite($event)"
                (addToCartClicked)="addToCart($event)">
            </app-product-card>
        </div>
        }
    </div>
</div>
